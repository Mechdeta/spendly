{% extends "base.html" %}

{% block title %}Edit Expense - Spendly{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">Edit Expense</h1>
            <p class="auth-subtitle">Update details and save changes</p>
        </div>

        <div class="auth-card">
            <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" class="form-input" value="{{ expense.description or '' }}" placeholder="Lunch, cab, internet bill">
                </div>
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" step="0.01" min="0.01" id="amount" name="amount" class="form-input" value="{{ expense.amount }}" required>
                </div>
                <div class="form-group">
                    <label for="expense_date">Date</label>
                    <input type="date" id="expense_date" name="expense_date" class="form-input" value="{{ expense.expense_date }}" required>
                </div>
                <div class="form-group">
                    <label for="category_id">Category</label>
                    <select id="category_id" name="category_id" class="form-input" required>
                        <option value="">Select category</option>
                        {% for category in categories %}
                        <option value="{{ category.id }}" {% if category.id == expense.category_id %}selected{% endif %}>{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn-submit">Save Changes</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('profile') }}">Back to dashboard</a>
        </p>
    </div>
</section>
{% endblock %}
